<template>
    <div class="filters slds-grid slds-wrap slds-grid_vertical-align-center">
        <!-- Time segment -->
        <div class="slds-col slds-size_3-of-12 slds-var-m-bottom_small">
            Time segment
        </div>
        <div class="slds-col slds-size_4-of-12 slds-var-m-bottom_small">
            <lightning-combobox
                label="Time segment"
                value={timeSegment}
                options={timeSegmentOptions}
                onchange={handleTimeSegmentChange}
                readonly={isTimeSegmentDisabled}
                variant="label-hidden"
            ></lightning-combobox>
        </div>
        <div
            class="slds-col slds-size_5-of-12 slds-var-m-bottom_small slds-var-p-left_small"
        >
            <c-notice lwc:if={isTimeSegmentDisabled}>
                Time segment granularity can only be adjusted if the
                <a
                    href="https://developer.salesforce.com/docs/atlas.en-us.platform_events.meta/platform_events/platform_events_monitor_enhanced_usage.htm"
                    target="_blank"
                    rel="noreferrer"
                    >Enhanced Usage Metrics</a
                >
                feature is enabled
            </c-notice>
        </div>
        <!-- Date Range Filter -->
        <div class="slds-col slds-size_3-of-12 slds-var-m-bottom_small">
            <lightning-input
                label="Filter by date range"
                type="toggle"
                class="toggle"
                checked={hasDateRangeFilter}
                onchange={handleDateRangeToggle}
            >
            </lightning-input>
        </div>
        <div class="slds-col slds-size_9-of-12 slds-var-m-bottom_small">
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input
                        label="After"
                        value={afterTime}
                        onchange={handleAfterTimeChange}
                        disabled={dateRangeDisabled}
                        type="datetime"
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input
                        label="Before"
                        value={beforeTime}
                        onchange={handleBeforeTimeChange}
                        disabled={dateRangeDisabled}
                        type="datetime"
                    ></lightning-input>
                </div>
            </div>
            <c-notice lwc:if={dateRangeError}>{dateRangeError}</c-notice>
        </div>

        <!-- Event types -->
        <div class="event-types slds-var-p-top_medium">
            <template for:each={eventTypeOptions} for:item="eventType">
                <div
                    key={eventType.index}
                    class="event-type slds-var-m-right_x-large"
                >
                    <span
                        class="dot slds-var-m-right_xx-small"
                        style={eventType.style}
                    ></span>
                    <lightning-input
                        type="toggle"
                        label={eventType.label}
                        message-toggle-active="Displayed"
                        message-toggle-inactive="Hidden"
                        checked={eventType.checked}
                        data-index={eventType.index}
                        onchange={handleEventTypeToggle}
                    ></lightning-input>
                </div>
            </template>
        </div>

        <!-- Reset -->
        <div
            class="slds-col slds-size_12-of-12 slds-align_absolute-center slds-var-m-top_small"
        >
            <lightning-button
                label="Clear filters"
                onclick={handleClearFilters}
            ></lightning-button>
        </div>
    </div>
</template>
